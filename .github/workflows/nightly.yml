# Various non-standard tests, requiring e.g. longer run
name: Nightly

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  WORK_DIR : "${{github.workspace}}/examples/level_zero_shared_memory"
  BUILD_DIR : "${{github.workspace}}/examples/level_zero_shared_memory/build"

jobs:
  # Build and test UMF with different CMake generators on Windows
  Windows-generators:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        compiler: [{c: cl, cxx: cl}]
        generator: ['Ninja', 'NMake Makefiles']
        umfd_lib: ['OFF']
    name: Windows (generator=${{matrix.generator}}, compilers=${{matrix.compiler.c}}/${{matrix.compiler.cxx}}, build_type=${{matrix.build_type}}, shared_library=${{matrix.shared_library}}, static_hwloc=${{matrix.static_hwloc}}, umfd_lib=${{matrix.umfd_lib}})

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0

    - name: Set VCPKG_PATH with hwloc
      run: echo "VCPKG_PATH=${{env.BUILD_DIR}}/vcpkg/packages/hwloc_x64-windows;${{env.BUILD_DIR}}/vcpkg/packages/tbb_x64-windows;${{env.BUILD_DIR}}/vcpkg/packages/jemalloc_x64-windows;${{env.BUILD_DIR}}/vcpkg/packages/level-zero_x64-windows" >> $env:GITHUB_ENV

    - name: Initialize vcpkg
      uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
      env: 
        VCPKG_PATH: ${{env.VCPKG_PATH}}
      with:
        vcpkgGitCommitId: ea2a964f9303270322cf3f2d51c265ba146c422d # 1.04.2025
        vcpkgDirectory: ${{env.BUILD_DIR}}/vcpkg
        vcpkgJsonGlob: '**/vcpkg.json'

#    - name: vcpkg git pull
#      working-directory: ${{env.BUILD_DIR}}/vcpkg
#      run: git pull

#    - name: vcpkg vcpkg update
#      working-directory: ${{env.BUILD_DIR}}/vcpkg
#      run: vcpkg update

    - name: Install dependencies
      run: vcpkg install --triplet x64-windows

    - name: Install Ninja
      if: matrix.generator == 'Ninja'
      uses: seanmiddleditch/gha-setup-ninja@3b1f8f94a2f8254bd26914c4ab9474d4f0015f67 # v6

    - name: Configure MSVC environment
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

    - name: Configure build
      working-directory: ${{env.WORK_DIR}}
      run: >
        cmake
        -B ${{env.BUILD_DIR}}
        -DCMAKE_BUILD_TYPE=${{matrix.build_type}}
        -DCMAKE_PREFIX_PATH="${{env.VCPKG_PATH}}"
        -DCMAKE_C_COMPILER=${{matrix.compiler.c}}
        -DCMAKE_CXX_COMPILER=${{matrix.compiler.cxx}}
        -G "${{matrix.generator}}"

    - name: Build UMF
      working-directory: ${{env.WORK_DIR}}
      shell: cmd
      run: cmake --build ${{env.BUILD_DIR}} --config ${{matrix.build_type}} -j %NUMBER_OF_PROCESSORS%

    - name: Run tests
      shell: cmd
      working-directory: ${{env.BUILD_DIR}}
      run: .\umf_example_level_zero_shared_memory
